name: Release Android

# NOTE: Automatic triggers are DISABLED (matching the repo's disabled-by-default CI policy).
# This workflow must be dispatched manually from the GitHub Actions UI or via the API.
# Enable push/pull_request triggers only when you are ready for automated releases.
on:
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run"
        required: true
        type: choice
        options:
          - beta
          - release
        default: beta
      version_number:
        description: "Semantic version (e.g. 1.2.3). Leave blank to keep current."
        required: false
        type: string
      build_number:
        description: "Build number integer (e.g. 42). Leave blank to keep current."
        required: false
        type: string

jobs:
  release-android:
    name: "Android ${{ inputs.lane }}"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # -------------------------------------------------------------------
      # Node / Yarn setup — matches .github/actions/setup/action.yml
      # -------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: .nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Cache Yarn dependencies
        id: yarn-cache
        uses: actions/cache@v3
        with:
          path: "**/node_modules"
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install Node dependencies
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: yarn install --immutable

      # -------------------------------------------------------------------
      # Ruby / Bundler setup
      # -------------------------------------------------------------------
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "2.7"
          bundler-cache: true
          working-directory: packages/client

      # -------------------------------------------------------------------
      # Java / Android SDK
      # -------------------------------------------------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('packages/client/android/**/*.gradle*', 'packages/client/android/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # -------------------------------------------------------------------
      # Run the release script (wraps fastlane)
      # -------------------------------------------------------------------
      - name: Release Android (${{ inputs.lane }})
        env:
          LANE: ${{ inputs.lane }}
          VERSION_NUMBER: ${{ inputs.version_number }}
          BUILD_NUMBER: ${{ inputs.build_number }}
          ENVFILE: packages/client/.env.production

          # Android signing
          ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

          # Google Play
          SUPPLY_JSON_KEY_DATA: ${{ secrets.SUPPLY_JSON_KEY_DATA }}

        run: sh scripts/release-android.sh "${LANE}"
