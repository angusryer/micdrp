name: CI

# Manual-trigger only while the audit lands and the lockfile is regenerated on a
# real dev machine (Phase V). Re-enable push/pull_request triggers once `yarn
# lint`/`yarn test` are green locally so we don't burn runner minutes on
# known-red pushes. (`typecheck` already passes.)
on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint files
        run: yarn lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup

      # The client package's Jest suite exercises the React Native UI stack
      # (reanimated, skia, gesture-handler, navigation). A Node-only CI runner
      # can't resolve those until the lockfile is regenerated with the native
      # deps actually installed (Phase V) — the committed yarn.lock predates
      # them and the cache step reuses that node_modules. So CI runs the pure-TS
      # packages — the DSP + analysis + contract core — which fully validate
      # here. The full client suite runs via `yarn test` once deps are installed.
      - name: Run unit tests (pure-TS packages)
        run: |
          yarn workspace logic test --coverage --maxWorkers=2
          yarn workspace models test --passWithNoTests --maxWorkers=2
          yarn workspace shared test --passWithNoTests --maxWorkers=2

  # The real mobile binary build/deploy (scripts/build.sh) requires macOS,
  # Xcode and Android signing, so it is a deployment-op concern rather than a
  # PR check. Here we validate that the whole TypeScript project compiles.
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Typecheck
        run: yarn typecheck
